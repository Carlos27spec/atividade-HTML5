<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
    <title>Contato</title>
</head>
<body>
    <header>
        <h1>IndieVerso</h1>
        <a href="sobre.html">Sobre Nós</a>
        <a href="index.html">Início</a>
        <a href="produtos.html">Produtos</a>
    </header>

    <div class="Formulario">
        <div class="form-header">
            <h2>Fale Conosco</h2>
            <p>Preencha o formulário e retornaremos em breve.</p>
        </div>

        <div class="campo">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" placeholder="Seu nome" />
        </div>

        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="campo">
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" placeholder="Como podemos ajudar?" />
        </div>

        <div class="campo">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>
        </div>

        <button class="btn-enviar" type="button">Enviar mensagem</button>
    </div>
</body>
</html>
